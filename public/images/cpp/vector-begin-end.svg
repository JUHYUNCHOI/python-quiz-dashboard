<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <rect width="600" height="260" fill="#F8FAFC" rx="12"/>

  <!-- Top index labels -->
  <g font-size="16" fill="#475569" font-weight="600">
    <text x="110" y="48" text-anchor="middle">v[0]</text>
    <text x="210" y="48" text-anchor="middle">v[1]</text>
    <text x="310" y="48" text-anchor="middle">v[2]</text>
    <text x="410" y="48" text-anchor="middle">v[3]</text>
  </g>

  <!-- Down arrows from indices to cells -->
  <g stroke="#94A3B8" stroke-width="1.5" fill="none">
    <line x1="110" y1="60" x2="110" y2="92"/>
    <line x1="210" y1="60" x2="210" y2="92"/>
    <line x1="310" y1="60" x2="310" y2="92"/>
    <line x1="410" y1="60" x2="410" y2="92"/>
  </g>
  <g fill="#94A3B8">
    <polygon points="110,98 106,90 114,90"/>
    <polygon points="210,98 206,90 214,90"/>
    <polygon points="310,98 306,90 314,90"/>
    <polygon points="410,98 406,90 414,90"/>
  </g>

  <!-- Cells container -->
  <g>
    <text x="44" y="140" font-size="28" fill="#334155" font-weight="700">{</text>
    <text x="532" y="140" font-size="28" fill="#334155" font-weight="700">}</text>
    <rect x="80" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="110" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">10</text>
    <text x="170" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="180" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="210" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">20</text>
    <text x="270" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="280" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="310" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">30</text>
    <text x="370" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="380" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="410" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">40</text>
  </g>

  <!-- begin arrow (points to first cell) -->
  <g>
    <line x1="110" y1="176" x2="110" y2="200" stroke="#4F46E5" stroke-width="2" fill="none"/>
    <polygon points="110,170 106,180 114,180" fill="#4F46E5"/>
    <text x="110" y="226" text-anchor="middle" font-size="16" fill="#4F46E5" font-weight="700">begin()</text>
    <text x="110" y="246" text-anchor="middle" font-size="12" fill="#64748B">첫 원소 위치</text>
  </g>

  <!-- end arrow (points past last cell) -->
  <g>
    <line x1="470" y1="176" x2="470" y2="200" stroke="#DC2626" stroke-width="2" fill="none"/>
    <polygon points="470,170 466,180 474,180" fill="#DC2626"/>
    <text x="470" y="226" text-anchor="middle" font-size="16" fill="#DC2626" font-weight="700">end()</text>
    <text x="470" y="246" text-anchor="middle" font-size="12" fill="#64748B">마지막 다음 (끝 표지판)</text>
  </g>
</svg>
