<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ms" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="360" fill="#F1F2FB" rx="24"/>

  <!-- ===== TOP: one blueprint ===== -->
  <rect x="240" y="24" width="200" height="96" rx="14" fill="#1E3A5F" filter="url(#ms)"/>
  <text x="340" y="52" text-anchor="middle" fill="#A7C4E8" font-size="15" font-weight="800">📐 class Car</text>

  <!-- Mini blueprint grid -->
  <g stroke="#3B5B85" stroke-width="0.4" opacity="0.7">
    <line x1="256" y1="66" x2="424" y2="66"/>
    <line x1="256" y1="86" x2="424" y2="86"/>
    <line x1="256" y1="106" x2="424" y2="106"/>
    <line x1="280" y1="60" x2="280" y2="114"/>
    <line x1="320" y1="60" x2="320" y2="114"/>
    <line x1="360" y1="60" x2="360" y2="114"/>
    <line x1="400" y1="60" x2="400" y2="114"/>
  </g>
  <!-- Mini car outline (dashed) -->
  <g stroke="#7FC4FF" stroke-width="1.8" fill="none" stroke-dasharray="3,2">
    <path d="M 266 100 L 278 86 L 324 86 L 338 72 L 374 72 L 388 86 L 416 86 L 416 100 L 266 100 Z"/>
    <circle cx="290" cy="100" r="8"/>
    <circle cx="392" cy="100" r="8"/>
  </g>

  <!-- Label under blueprint -->
  <text x="340" y="140" text-anchor="middle" fill="#6B7280" font-size="12" font-weight="600">설계도 1개</text>

  <!-- ===== ARROWS fanning out ===== -->
  <g stroke="#6366F1" stroke-width="2.5" fill="none">
    <path d="M 300 154 Q 200 180 130 220" stroke-linecap="round"/>
    <path d="M 340 154 L 340 215" stroke-linecap="round"/>
    <path d="M 380 154 Q 480 180 550 220" stroke-linecap="round"/>
  </g>
  <polygon points="126,214 137,228 140,212" fill="#6366F1"/>
  <polygon points="335,213 340,224 345,213" fill="#6366F1"/>
  <polygon points="540,212 553,220 548,208" fill="#6366F1"/>

  <!-- ===== BOTTOM: 3 cars ===== -->
  <!-- Car 1 — red -->
  <g transform="translate(40 224)">
    <path d="M 10 56 L 22 32 L 68 32 L 86 14 L 118 14 L 132 32 L 140 32 L 140 56 L 10 56 Z" fill="#EF4444"/>
    <path d="M 30 36 L 68 36 L 82 20 L 58 20 Z" fill="#FECACA" opacity="0.9"/>
    <path d="M 74 36 L 116 36 L 118 20 L 92 20 Z" fill="#FECACA" opacity="0.9"/>
    <rect x="10" y="56" width="130" height="8" fill="#7F1D1D"/>
    <circle cx="36" cy="66" r="12" fill="#1F2937"/>
    <circle cx="36" cy="66" r="5" fill="#6B7280"/>
    <circle cx="114" cy="66" r="12" fill="#1F2937"/>
    <circle cx="114" cy="66" r="5" fill="#6B7280"/>
    <rect x="10" y="90" width="130" height="22" rx="8" fill="white" filter="url(#ms)"/>
    <text x="75" y="105" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="700">car1 — 빨간색</text>
  </g>

  <!-- Car 2 — blue -->
  <g transform="translate(270 224)">
    <path d="M 10 56 L 22 32 L 68 32 L 86 14 L 118 14 L 132 32 L 140 32 L 140 56 L 10 56 Z" fill="#3B82F6"/>
    <path d="M 30 36 L 68 36 L 82 20 L 58 20 Z" fill="#BFDBFE" opacity="0.9"/>
    <path d="M 74 36 L 116 36 L 118 20 L 92 20 Z" fill="#BFDBFE" opacity="0.9"/>
    <rect x="10" y="56" width="130" height="8" fill="#1E3A8A"/>
    <circle cx="36" cy="66" r="12" fill="#1F2937"/>
    <circle cx="36" cy="66" r="5" fill="#6B7280"/>
    <circle cx="114" cy="66" r="12" fill="#1F2937"/>
    <circle cx="114" cy="66" r="5" fill="#6B7280"/>
    <rect x="10" y="90" width="130" height="22" rx="8" fill="white" filter="url(#ms)"/>
    <text x="75" y="105" text-anchor="middle" fill="#1D4ED8" font-size="11" font-weight="700">car2 — 파란색</text>
  </g>

  <!-- Car 3 — yellow -->
  <g transform="translate(500 224)">
    <path d="M 10 56 L 22 32 L 68 32 L 86 14 L 118 14 L 132 32 L 140 32 L 140 56 L 10 56 Z" fill="#FACC15"/>
    <path d="M 30 36 L 68 36 L 82 20 L 58 20 Z" fill="#FEF08A" opacity="0.9"/>
    <path d="M 74 36 L 116 36 L 118 20 L 92 20 Z" fill="#FEF08A" opacity="0.9"/>
    <rect x="10" y="56" width="130" height="8" fill="#713F12"/>
    <circle cx="36" cy="66" r="12" fill="#1F2937"/>
    <circle cx="36" cy="66" r="5" fill="#6B7280"/>
    <circle cx="114" cy="66" r="12" fill="#1F2937"/>
    <circle cx="114" cy="66" r="5" fill="#6B7280"/>
    <rect x="10" y="90" width="130" height="22" rx="8" fill="white" filter="url(#ms)"/>
    <text x="75" y="105" text-anchor="middle" fill="#A16207" font-size="11" font-weight="700">car3 — 노란색</text>
  </g>

  <text x="340" y="352" text-anchor="middle" fill="#6B7280" font-size="12" font-weight="600">객체는 원하는 만큼!</text>
</svg>
