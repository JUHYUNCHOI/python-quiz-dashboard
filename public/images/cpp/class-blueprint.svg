<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="bs" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="#F1F2FB" rx="24"/>

  <!-- ===== LEFT: class (blueprint) ===== -->
  <rect x="28" y="28" width="340" height="364" rx="18" fill="#1E3A5F" filter="url(#bs)"/>

  <!-- Header -->
  <rect x="28" y="28" width="340" height="52" rx="18" fill="#1E3A5F"/>
  <rect x="28" y="62" width="340" height="18" fill="#1E3A5F"/>
  <text x="198" y="58" text-anchor="middle" fill="#A7C4E8" font-size="18" font-weight="800">📐 class (설계도)</text>

  <!-- Blueprint grid lines -->
  <g stroke="#3B5B85" stroke-width="0.5" opacity="0.7">
    <line x1="44" y1="100" x2="352" y2="100"/>
    <line x1="44" y1="130" x2="352" y2="130"/>
    <line x1="44" y1="160" x2="352" y2="160"/>
    <line x1="44" y1="190" x2="352" y2="190"/>
    <line x1="44" y1="220" x2="352" y2="220"/>
    <line x1="44" y1="250" x2="352" y2="250"/>
    <line x1="44" y1="280" x2="352" y2="280"/>
    <line x1="44" y1="310" x2="352" y2="310"/>
    <line x1="74" y1="100" x2="74" y2="380"/>
    <line x1="134" y1="100" x2="134" y2="380"/>
    <line x1="194" y1="100" x2="194" y2="380"/>
    <line x1="254" y1="100" x2="254" y2="380"/>
    <line x1="314" y1="100" x2="314" y2="380"/>
  </g>

  <!-- Car outline (dashed) -->
  <g stroke="#7FC4FF" stroke-width="2.5" fill="none" stroke-dasharray="5,3">
    <path d="M 70 250 L 90 210 L 150 210 L 180 175 L 260 175 L 290 210 L 330 210 L 330 250 Z"/>
    <path d="M 110 210 L 150 210 L 175 180 L 150 180 Z"/>
    <path d="M 185 210 L 260 210 L 260 180 L 210 180 Z"/>
    <circle cx="120" cy="260" r="18"/>
    <circle cx="120" cy="260" r="7"/>
    <circle cx="290" cy="260" r="18"/>
    <circle cx="290" cy="260" r="7"/>
    <line x1="50" y1="285" x2="350" y2="285" stroke-dasharray="3,3"/>
  </g>

  <!-- Spec labels at bottom -->
  <text x="44" y="334" fill="#A7C4E8" font-size="12" font-family="ui-monospace, 'SF Mono', monospace">double speed;</text>
  <text x="44" y="354" fill="#A7C4E8" font-size="12" font-family="ui-monospace, 'SF Mono', monospace">string color;</text>
  <text x="44" y="374" fill="#A7C4E8" font-size="12" font-family="ui-monospace, 'SF Mono', monospace">void forward();</text>

  <!-- ===== ARROW ===== -->
  <g>
    <line x1="388" y1="210" x2="436" y2="210" stroke="#6366F1" stroke-width="3"/>
    <polygon points="432,202 444,210 432,218" fill="#6366F1"/>
    <text x="412" y="196" text-anchor="middle" fill="#6366F1" font-size="13" font-weight="700">Car myCar;</text>
    <text x="412" y="236" text-anchor="middle" fill="#6366F1" font-size="11">객체 생성</text>
  </g>

  <!-- ===== RIGHT: object (real car) ===== -->
  <rect x="460" y="28" width="332" height="364" rx="18" fill="white" filter="url(#bs)"/>

  <!-- Header -->
  <rect x="460" y="28" width="332" height="52" rx="18" fill="#EEF2FF"/>
  <rect x="460" y="62" width="332" height="18" fill="#EEF2FF"/>
  <text x="626" y="58" text-anchor="middle" fill="#4F46E5" font-size="18" font-weight="800">🚗 object (실체)</text>

  <!-- Red car -->
  <g>
    <path d="M 498 260 L 518 220 L 580 220 L 612 185 L 692 185 L 722 220 L 762 220 L 762 260 Z" fill="#EF4444"/>
    <path d="M 498 260 L 762 260 L 762 270 L 498 270 Z" fill="#B91C1C"/>
    <path d="M 538 220 L 580 220 L 605 190 L 580 190 Z" fill="#BFDBFE" opacity="0.85"/>
    <path d="M 615 220 L 692 220 L 690 190 L 640 190 Z" fill="#BFDBFE" opacity="0.85"/>
    <line x1="620" y1="225" x2="620" y2="258" stroke="#991B1B" stroke-width="1.5"/>
    <rect x="635" y="242" width="14" height="3" rx="1.5" fill="#7F1D1D"/>
    <circle cx="548" cy="275" r="20" fill="#1F2937"/>
    <circle cx="548" cy="275" r="9" fill="#6B7280"/>
    <circle cx="548" cy="275" r="3" fill="#374151"/>
    <circle cx="718" cy="275" r="20" fill="#1F2937"/>
    <circle cx="718" cy="275" r="9" fill="#6B7280"/>
    <circle cx="718" cy="275" r="3" fill="#374151"/>
    <ellipse cx="760" cy="240" rx="4" ry="6" fill="#FEF3C7"/>
  </g>

  <!-- Spec callouts -->
  <rect x="486" y="322" width="130" height="34" rx="12" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="551" y="344" text-anchor="middle" fill="#B91C1C" font-size="13" font-weight="700">color = 빨간색</text>

  <rect x="636" y="322" width="130" height="34" rx="12" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="701" y="344" text-anchor="middle" fill="#4338CA" font-size="13" font-weight="700">speed = 20</text>
</svg>
