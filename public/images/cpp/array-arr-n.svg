<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <rect width="720" height="260" fill="#F8FAFC" rx="12"/>

  <!-- Top position labels -->
  <g font-size="15" fill="#475569" font-weight="600">
    <text x="110" y="46" text-anchor="middle">arr</text>
    <text x="210" y="46" text-anchor="middle">arr+1</text>
    <text x="310" y="46" text-anchor="middle">arr+2</text>
    <text x="410" y="46" text-anchor="middle">arr+3</text>
    <text x="510" y="46" text-anchor="middle">arr+4</text>
    <text x="610" y="46" text-anchor="middle" fill="#DC2626">arr+5</text>
  </g>

  <!-- Down arrows from positions -->
  <g stroke="#94A3B8" stroke-width="1.5" fill="none">
    <line x1="110" y1="58" x2="110" y2="92"/>
    <line x1="210" y1="58" x2="210" y2="92"/>
    <line x1="310" y1="58" x2="310" y2="92"/>
    <line x1="410" y1="58" x2="410" y2="92"/>
    <line x1="510" y1="58" x2="510" y2="92"/>
  </g>
  <line x1="610" y1="58" x2="610" y2="92" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g fill="#94A3B8">
    <polygon points="110,98 106,90 114,90"/>
    <polygon points="210,98 206,90 214,90"/>
    <polygon points="310,98 306,90 314,90"/>
    <polygon points="410,98 406,90 414,90"/>
    <polygon points="510,98 506,90 514,90"/>
  </g>
  <polygon points="610,98 606,90 614,90" fill="#DC2626"/>

  <!-- Cells -->
  <g>
    <text x="64" y="140" font-size="28" fill="#334155" font-weight="700">{</text>
    <text x="652" y="140" font-size="28" fill="#334155" font-weight="700">}</text>
    <rect x="80" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="110" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">10</text>
    <text x="170" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="180" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="210" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">20</text>
    <text x="270" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="280" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="310" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">30</text>
    <text x="370" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="380" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="410" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">40</text>
    <text x="470" y="140" font-size="22" fill="#64748B">,</text>
    <rect x="480" y="110" width="60" height="44" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="510" y="140" text-anchor="middle" font-size="18" fill="#0F172A" font-weight="700">50</text>
  </g>

  <!-- Bottom labels -->
  <g>
    <text x="110" y="192" text-anchor="middle" font-size="14" fill="#4F46E5" font-weight="700">시작 위치</text>
    <text x="110" y="210" text-anchor="middle" font-size="12" fill="#64748B">(v.begin()과 같은 역할)</text>
  </g>
  <g>
    <text x="610" y="192" text-anchor="middle" font-size="14" fill="#DC2626" font-weight="700">끝 표지판</text>
    <text x="610" y="210" text-anchor="middle" font-size="12" fill="#64748B">(v.end()과 같은 역할)</text>
  </g>
</svg>
