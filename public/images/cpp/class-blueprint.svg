<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="bs" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="320" fill="#F1F2FB" rx="24"/>

  <!-- ===== LEFT: class (blueprint) ===== -->
  <rect x="24" y="24" width="280" height="272" rx="18" fill="#1E3A5F" filter="url(#bs)"/>

  <!-- Header -->
  <rect x="24" y="24" width="280" height="44" rx="18" fill="#1E3A5F"/>
  <rect x="24" y="54" width="280" height="14" fill="#1E3A5F"/>
  <text x="164" y="50" text-anchor="middle" fill="#A7C4E8" font-size="17" font-weight="800">📐 class (설계도)</text>

  <!-- Blueprint grid lines -->
  <g stroke="#3B5B85" stroke-width="0.5" opacity="0.7">
    <line x1="44" y1="88" x2="284" y2="88"/>
    <line x1="44" y1="108" x2="284" y2="108"/>
    <line x1="44" y1="128" x2="284" y2="128"/>
    <line x1="44" y1="148" x2="284" y2="148"/>
    <line x1="44" y1="168" x2="284" y2="168"/>
    <line x1="44" y1="188" x2="284" y2="188"/>
    <line x1="44" y1="208" x2="284" y2="208"/>
    <line x1="44" y1="228" x2="284" y2="228"/>
    <line x1="44" y1="248" x2="284" y2="248"/>
    <line x1="44" y1="268" x2="284" y2="268"/>
    <line x1="64" y1="88" x2="64" y2="284"/>
    <line x1="104" y1="88" x2="104" y2="284"/>
    <line x1="144" y1="88" x2="144" y2="284"/>
    <line x1="184" y1="88" x2="184" y2="284"/>
    <line x1="224" y1="88" x2="224" y2="284"/>
    <line x1="264" y1="88" x2="264" y2="284"/>
  </g>

  <!-- Car outline (dashed) -->
  <g stroke="#7FC4FF" stroke-width="2.5" fill="none" stroke-dasharray="5,3">
    <path d="M 70 200 L 90 170 L 160 170 L 185 150 L 235 150 L 255 170 L 275 170 L 275 200 L 70 200 Z"/>
    <circle cx="105" cy="200" r="16"/>
    <circle cx="240" cy="200" r="16"/>
  </g>

  <!-- Spec labels -->
  <text x="44" y="244" fill="#A7C4E8" font-size="11" font-family="monospace">double speed;</text>
  <text x="44" y="262" fill="#A7C4E8" font-size="11" font-family="monospace">string color;</text>
  <text x="44" y="280" fill="#A7C4E8" font-size="11" font-family="monospace">void forward();</text>

  <!-- ===== ARROW ===== -->
  <g>
    <line x1="324" y1="160" x2="380" y2="160" stroke="#6366F1" stroke-width="3"/>
    <polygon points="376,152 388,160 376,168" fill="#6366F1"/>
    <text x="354" y="146" text-anchor="middle" fill="#6366F1" font-size="13" font-weight="700">Car myCar;</text>
    <text x="354" y="186" text-anchor="middle" fill="#6366F1" font-size="11">객체 생성</text>
  </g>

  <!-- ===== RIGHT: object (real car) ===== -->
  <rect x="408" y="24" width="248" height="272" rx="18" fill="white" filter="url(#bs)"/>

  <!-- Header -->
  <rect x="408" y="24" width="248" height="44" rx="18" fill="#EEF2FF"/>
  <rect x="408" y="54" width="248" height="14" fill="#EEF2FF"/>
  <text x="532" y="50" text-anchor="middle" fill="#4F46E5" font-size="17" font-weight="800">🚗 object (실체)</text>

  <!-- Red car body -->
  <g filter="url(#bs)">
    <path d="M 440 210 L 462 172 L 540 172 L 568 146 L 614 146 L 634 172 L 642 172 L 642 210 L 440 210 Z" fill="#EF4444"/>
    <path d="M 476 176 L 540 176 L 560 154 L 524 154 Z" fill="#FECACA" opacity="0.9"/>
    <path d="M 544 176 L 608 176 L 610 154 L 574 154 Z" fill="#FECACA" opacity="0.9"/>
    <rect x="440" y="210" width="202" height="14" fill="#7F1D1D"/>
    <circle cx="478" cy="226" r="18" fill="#1F2937"/>
    <circle cx="478" cy="226" r="7" fill="#6B7280"/>
    <circle cx="604" cy="226" r="18" fill="#1F2937"/>
    <circle cx="604" cy="226" r="7" fill="#6B7280"/>
  </g>

  <!-- Spec callouts -->
  <rect x="432" y="260" width="100" height="24" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="482" y="277" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="700">color = 빨간색</text>

  <rect x="540" y="260" width="100" height="24" rx="10" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="590" y="277" text-anchor="middle" fill="#4338CA" font-size="11" font-weight="700">speed = 20</text>
</svg>
