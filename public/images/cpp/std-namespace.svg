<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="300" fill="#F1F2FB" rx="20"/>

  <!-- ===== LEFT CARD: 학교 비유 ===== -->
  <rect x="20" y="20" width="280" height="260" rx="18" fill="white" filter="url(#sh)"/>
  <!-- Header -->
  <rect x="20" y="20" width="280" height="52" rx="18" fill="#EEF2FF"/>
  <rect x="20" y="52" width="280" height="20" fill="#EEF2FF"/>
  <text x="160" y="50" text-anchor="middle" fill="#4F46E5" font-size="15" font-weight="800">🏫 학교에서</text>

  <!-- 1반 민수 row -->
  <rect x="40" y="90" width="240" height="52" rx="14" fill="#F8F8FF"/>
  <rect x="54" y="103" width="52" height="28" rx="9" fill="#6366F1"/>
  <text x="80" y="121" text-anchor="middle" fill="white" font-size="13" font-weight="700">1반</text>
  <text x="122" y="122" fill="#9CA3AF" font-size="18" font-weight="300">::</text>
  <rect x="142" y="103" width="118" height="28" rx="9" fill="#EEF2FF"/>
  <text x="201" y="121" text-anchor="middle" fill="#4338CA" font-size="14" font-weight="700">민수</text>

  <!-- 2반 민수 row -->
  <rect x="40" y="155" width="240" height="52" rx="14" fill="#FFF8F0"/>
  <rect x="54" y="168" width="52" height="28" rx="9" fill="#F97316"/>
  <text x="80" y="186" text-anchor="middle" fill="white" font-size="13" font-weight="700">2반</text>
  <text x="122" y="187" fill="#9CA3AF" font-size="18" font-weight="300">::</text>
  <rect x="142" y="168" width="118" height="28" rx="9" fill="#FFF0E0"/>
  <text x="201" y="186" text-anchor="middle" fill="#C2410C" font-size="14" font-weight="700">민수</text>

  <!-- note -->
  <rect x="40" y="224" width="240" height="38" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="160" y="247" text-anchor="middle" fill="#15803D" font-size="12" font-weight="600">✅ 반 이름으로 구분!</text>

  <!-- ===== ARROW ===== -->
  <text x="320" y="145" text-anchor="middle" fill="#A5B4FC" font-size="30">→</text>
  <text x="320" y="168" text-anchor="middle" fill="#C7D2FE" font-size="11" font-weight="600">똑같아요</text>

  <!-- ===== RIGHT CARD: C++ ===== -->
  <rect x="340" y="20" width="280" height="260" rx="18" fill="white" filter="url(#sh)"/>
  <!-- Header -->
  <rect x="340" y="20" width="280" height="52" rx="18" fill="#FFF4E6"/>
  <rect x="340" y="52" width="280" height="20" fill="#FFF4E6"/>
  <text x="480" y="50" text-anchor="middle" fill="#EA580C" font-size="15" font-weight="800">⚡ C++에서</text>

  <!-- std::cout row -->
  <rect x="360" y="90" width="240" height="52" rx="14" fill="#F8F8FF"/>
  <rect x="374" y="103" width="52" height="28" rx="9" fill="#6366F1"/>
  <text x="400" y="121" text-anchor="middle" fill="white" font-size="13" font-weight="700">std</text>
  <text x="442" y="122" fill="#9CA3AF" font-size="18" font-weight="300">::</text>
  <rect x="462" y="103" width="118" height="28" rx="9" fill="#FEE2E2"/>
  <text x="521" y="121" text-anchor="middle" fill="#B91C1C" font-size="14" font-weight="700">cout</text>

  <!-- std::endl row -->
  <rect x="360" y="155" width="240" height="52" rx="14" fill="#F8FFF9"/>
  <rect x="374" y="168" width="52" height="28" rx="9" fill="#6366F1"/>
  <text x="400" y="186" text-anchor="middle" fill="white" font-size="13" font-weight="700">std</text>
  <text x="442" y="187" fill="#9CA3AF" font-size="18" font-weight="300">::</text>
  <rect x="462" y="168" width="118" height="28" rx="9" fill="#DCFCE7"/>
  <text x="521" y="186" text-anchor="middle" fill="#15803D" font-size="14" font-weight="700">endl</text>

  <!-- note -->
  <rect x="360" y="224" width="240" height="38" rx="12" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="480" y="247" text-anchor="middle" fill="#4338CA" font-size="12" font-weight="600">그룹이름 :: 도구이름</text>
</svg>
